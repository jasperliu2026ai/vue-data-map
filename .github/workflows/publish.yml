name: Publish to npm

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write   # required for npm Trusted Publishing (OIDC)
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      # npm >= 11.5.1 is required for Trusted Publishing
      - name: Upgrade npm
        run: npm install -g npm@latest

      - name: Install
        run: npm install

      - name: Build
        run: npm run build -w vue-data-map

      - name: Publish
        working-directory: packages/vue-data-map
        # No NODE_AUTH_TOKEN needed — npm CLI auto-detects GitHub OIDC
        run: npm publish --access public --provenance
