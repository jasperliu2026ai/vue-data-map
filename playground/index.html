<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>vue-data-map · Live Preview</title>
  <style>
    html, body { margin: 0; padding: 0; background: #eef1f6; min-height: 100vh; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", Arial, sans-serif;
    }
    .demo-shell {
      max-width: 1320px;
      margin: 0 auto;
      padding: 24px 16px 48px;
    }
    .demo-toolbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
    }
    .demo-toolbar h1 {
      font-size: 16px;
      margin: 0;
      color: #4a4f60;
      font-weight: 600;
    }
    .demo-toolbar h1 small { color: #9aa0b0; font-weight: 400; }
    .demo-toolbar button {
      font-size: 13px;
      padding: 6px 14px;
      border: 1px solid #d8dce6;
      background: #fff;
      border-radius: 6px;
      cursor: pointer;
      color: #4a4f60;
    }
    .demo-toolbar button:hover { border-color: #7B5BF1; color: #7B5BF1; }
  </style>
</head>
<body>
  <div id="app"></div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
